<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodPalette</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h1>MoodPalette</h1>
    <div id="nav-user">
      <img id="profile-pic" src="assets/images/default-profile.png" alt="Profile Picture">
      <span id="username">Guest</span>
    </div>
  </nav>
<input type="file" id="profile-upload" accept="image/*" style="display:none">
  <main>
    <div id="feed">
      <h2>Feed</h2>
      <div id="posts-container"></div>
    </div>
    <div id="create-post">
      <h3>Create Post</h3>
      <form id="postForm">
        <input type="text" id="postTitle" placeholder="Title" required>
        <textarea id="postBody" placeholder="Write your post..." required></textarea>
        <button type="submit">Post</button>
      </form>
    </div>
  </main>

  <!-- Scripts -->
  <script type="module" src="./script.js"></script>
  
</body>
</html>
